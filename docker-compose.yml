version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: gym-mysql
    restart: always
    environment:
      MYSQL_DATABASE: tesis_gym
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_USER: gym_user
      MYSQL_PASSWORD: gym_password
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  backend:
    build: 
      context: ./Back-end/tesis-gym 
    container_name: gym-backend
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/tesis_gym?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root_password

  front:
    image: node:22-alpine
    container_name: gym-frontend
    restart: always
    working_dir: /app
    volumes:
      - ./Front:/app
      - /app/node_modules
    ports:
      - "5174:5174"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://backend:8080

volumes:
  mysql-data: