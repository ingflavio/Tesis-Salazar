spring:
  datasource:
    url: jdbc:mysql://localhost:3307/tesis_gym?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: root_password
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update  # Esta es la propiedad clave
    show-sql: true
    properties:
      hibernate:
        format_sql: true

# Swagger configuration
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method